async function fetchWeather(lat,lon,days=7){

  const r=await fetch(`https://api.open-meteo.com/v1/forecast?${p}`);
  if(!r.ok)throw new Error(`API ${r.status}`);
  const j=await r.json();
  var cur=null;
  if(j.current_weather){
    var ch=60,ct=j.current_weather.time;if(ct&&j.hourly&&j.hourly.relative_humidity_2m){var ck=ct.substring(0,13);for(var h=0;h<j.hourly.time.length;h++){if(j.hourly.time[h].startsWith(ck)){ch=j.hourly.relative_humidity_2m[h];break}}}
    cur={temp:j.current_weather.temperature,hum:ch,wc:j.current_weather.weathercode,ws:j.current_weather.windspeed,time:ct};
  }
  var dh=[];

    for(var d=0;d<j.daily.time.length;d++){
      var dd=j.daily.time[d],s=0,c=0;
      for(var h=0;h<j.hourly.time.length;h++){

    }

  return {current:cur,daily:daysArr};
}

function buildGrid(y,m,wm){
  const days=[],dim=getDIM(y,m),fd=getFDOM(y,m);
  const pm=m===0?11:m-1,py=m===0?y-1:y,pDim=getDIM(py,pm);
  for(let i=fd-1;i>=0;i--){const d=new Date(py,pm,pDim-i),ds=fds(d);days.push({date:d,ds,dom:pDim-i,isT:isToday(d),isW:isWeekend(d),isCM:false,w:wm.get(ds),h:getHoliday(ds)});}
  for(let i=1;i<=dim;i++){const d=new Date(y,m,i),ds=fds(d);days.push({date:d,ds,dom:i,isT:isToday(d),isW:isWeekend(d),isCM:true,w:wm.get(ds),h:getHoliday(ds)});}
  const rem=42-days.length,nm=m===11?0:m+1,ny=m===11?y+1:y;
  for(let i=1;i<=rem;i++){const d=new Date(ny,nm,i),ds=fds(d);days.push({date:d,ds,dom:i,isT:isToday(d),isW:isWeekend(d),isCM:false,w:wm.get(ds),h:getHoliday(ds)});}

}

  return cell;
}

// ============ RENDER ============
function render(){
  const app=$('#app');app.innerHTML='';
  const wm=new Map();state.weather.forEach(w=>wm.set(w.date,w));
  const days=buildGrid(state.year,state.month,wm);
  const ts=fds(new Date());
  const tw=wm.get(ts),th=getHoliday(ts);

  // Header
  const hdr=h('header','pt-6 pb-2 px-1');
  const hr=h('div','flex items-center justify-between');
  const hl=h('div');
  hl.appendChild(h('h1','text-xl font-bold tracking-tight text-slate-800',{},'天气日历'));
  // City picker
  const cp=h('div','relative inline-block mt-0.5');
  const cBtn=h('button','text-xs text-slate-400 hover:text-slate-600 transition-colors underline underline-offset-2 decoration-dotted',{onclick:e=>{e.stopPropagation();state.cityOpen=!state.cityOpen;render();}},(state.city||'选择城市'));
  cp.appendChild(cBtn);
  if(state.cityOpen){
    const dd=h('div','city-dropdown absolute top-6 left-0 z-50 w-44 max-h-60 overflow-y-auto bg-white rounded-xl shadow-lg border border-slate-200 py-1');
    const si=h('input','w-full text-xs px-2 py-1.5 border-b border-slate-100 focus:outline-none',{type:'text',placeholder:'搜索城市...',value:state.citySearch});
    si.addEventListener('input',e=>{state.citySearch=e.target.value;render();});
    dd.appendChild(si);
    const q=state.citySearch.trim().toLowerCase();
    const list=q?CITIES.filter(c=>c.name.includes(q)):CITIES;
    list.forEach(c=>{dd.appendChild(h('button','w-full text-left px-3 py-1.5 text-sm transition-colors'+(c.name===state.city?' bg-indigo-50 text-indigo-600 font-medium':' text-slate-600 hover:bg-slate-50'),{onclick:()=>{selectCity(c);}},(c.name)));});
    if(!list.length)dd.appendChild(h('p','text-xs text-slate-400 text-center py-2',{},'无匹配'));
    cp.appendChild(dd);
    setTimeout(()=>{document.addEventListener('mousedown',function f(e){if(!cp.contains(e.target)){state.cityOpen=false;render();document.removeEventListener('mousedown',f);}},{once:false});},0);
  }
  if(state.error)cp.appendChild(h('span','text-amber-500 text-xs ml-1',{},'· '+state.error));
  hl.appendChild(cp);
  hr.appendChild(hl);
  const refBtn=h('button','w-8 h-8 flex items-center justify-center rounded-full text-slate-400 hover:bg-white active:bg-slate-200 transition-colors',{onclick:refreshAll},'⟳');
  if(state.loading)refBtn.className+=' spinner';
  hr.appendChild(refBtn);
  hdr.appendChild(hr);
  app.appendChild(hdr);

  // Today
  const ts2=h('section','mb-4 fade-in');
  if(state.loading){ts2.appendChild(h('div','flex items-center justify-center py-10',{},h('div','spinner w-8 h-8 border-2 border-indigo-300 border-t-indigo-500 rounded-full')));}
  else if(tw){
    const card=h('div','bg-white rounded-2xl shadow-sm border border-slate-100 p-4 space-y-3');
    // 当前温度（大字）
    if(state.cur){
      var cRow=h('div','flex items-center gap-3 pb-3 border-b border-slate-50');
      var cTemp=h('div','flex items-baseline gap-1');
      cTemp.appendChild(h('span','text-4xl font-bold text-slate-800 tracking-tight',{},String(Math.round(state.cur.temp))));
      cTemp.appendChild(h('span','text-lg text-slate-400',{},'°C'));
      cRow.appendChild(cTemp);
      var cInfo=h('div','flex flex-col gap-0.5');
      var ci=weatherDesc(state.cur.wc,state.cur.temp);
      cInfo.appendChild(h('span','text-xs text-slate-400',{},ci[0]+' '+ci[1]));
      cInfo.appendChild(h('span','text-xs text-slate-400',{},'💧 '+state.cur.hum+'% · 💨 '+state.cur.ws+' km/h'));
      cRow.appendChild(cInfo);
      var cTime=h('div','ml-auto text-right');
      var dt2=new Date(state.cur.time);
      cTime.appendChild(h('span','text-[10px] text-slate-300',{},dt2.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})+' 更新'));
      cRow.appendChild(cTime);
      card.appendChild(cRow);
    }
    const r1=h('div','flex items-center justify-between');
    const dl=h('div');
    const dt=new Date(tw.date+'T00:00:00');
    dl.appendChild(h('p','text-sm text-slate-500',{},dt.toLocaleDateString('zh-CN',{month:'long',day:'numeric',weekday:'short'})));
    if(th){dl.appendChild(h('span','inline-block mt-0.5 text-xs font-medium px-1.5 py-0.5 rounded '+(th.t==='workday'?'bg-orange-50 text-orange-600':'bg-red-50 text-red-600'),{},th.n));}
    r1.appendChild(dl);
    const dr=h('div','flex items-center gap-3');
    const[ic,txt]=weatherDesc(tw.wc,(tw.tMax+tw.tMin)/2);
    dr.appendChild(h('span','text-4xl float',{},ic));
    dr.appendChild(h('span','text-xs text-slate-400',{},txt));
    r1.appendChild(dr);card.appendChild(r1);
    const r2=h('div','flex items-center gap-4');
    const td=h('div','flex-1');
    const tsp=h('span','temp-text text-2xl inline-flex items-center gap-1');
    tsp.appendChild(h('span',tempClr(tw.tMax),{},Math.round(tw.tMax)+'°'));
    tsp.appendChild(h('span','text-slate-300 font-normal',{},'/'));
    tsp.appendChild(h('span',tempClr(tw.tMin),{},Math.round(tw.tMin)+'°'));
    td.appendChild(tsp);r2.appendChild(td);
    const dd2=h('div','flex flex-col gap-1 items-end');
    dd2.appendChild(h('span','text-xs text-slate-400',{},'💧'+tw.hum+'%'));
    dd2.appendChild(h('span','text-xs text-slate-300',{},'💨 '+tw.ws+' km/h'));
    if(tw.precip>0)dd2.appendChild(h('span','text-xs text-cyan-500',{},'🌧 '+tw.precip+' mm'));
    r2.appendChild(dd2);card.appendChild(r2);
    const bar=h('div','h-1.5 rounded-full bg-gradient-to-r from-blue-400 via-green-400 via-amber-400 to-red-500 relative overflow-hidden');
    const pct=Math.max(0,Math.min(100,((tw.tMin+tw.tMax)/2+10)/50*100));
    bar.appendChild(h('div','absolute top-0 h-full w-1.5 bg-white rounded-full shadow-md ring-1 ring-slate-200',{style:'left:'+pct+'%;transform:translateX(-50%)'}));
    card.appendChild(bar);
    const adv=getClothing(tw.tMax,tw.tMin,tw.hum,tw.ws,tw.precip);
    const cc=h('div','bg-white rounded-2xl px-4 py-3 shadow-sm border border-slate-100');
    const cr=h('div','flex items-center gap-3');
    cr.appendChild(h('span','text-3xl',{},adv.icon));
    const ct=h('div','flex-1 min-w-0');
    ct.appendChild(h('p','font-semibold text-slate-700',{},adv.text));
    ct.appendChild(h('p','text-xs text-slate-400 mt-0.5',{},adv.detail));
    cr.appendChild(ct);cc.appendChild(cr);card.appendChild(cc);
    ts2.appendChild(card);
  }else{ts2.appendChild(h('div','text-center py-8 text-slate-400 text-sm',html:'<p>暂无天气数据</p><p class="text-xs mt-1">请选择城市后刷新</p>'));}
  app.appendChild(ts2);

  // Month nav
  const nav=h('div','flex items-center justify-between px-1 py-2');
  nav.appendChild(h('button','w-9 h-9 flex items-center justify-center rounded-full text-slate-400 hover:bg-slate-100 active:bg-slate-200',{onclick:()=>chgM(-1)},'←'));
  const mb=h('button','flex flex-col items-center group',{onclick:goToday});
  mb.appendChild(h('span','text-lg font-bold text-slate-700',{},MONTHS[state.month]+' '+state.year));
  mb.appendChild(h('span','text-[10px] text-slate-300 opacity-0 group-hover:opacity-100 transition-opacity',{},'回到今天'));
  nav.appendChild(mb);
  nav.appendChild(h('button','w-9 h-9 flex items-center justify-center rounded-full text-slate-400 hover:bg-slate-100 active:bg-slate-200',{onclick:()=>chgM(1)},'→'));
  app.appendChild(nav);

  // Calendar
  const gs=h('section','flex-1 slide-in');
  const gc=h('div','bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden');
  const wr=h('div','grid grid-cols-7 gap-0.5 bg-slate-50/80 border-b border-slate-100');
  WDAYS.forEach(l=>wr.appendChild(h('div','text-center text-xs font-medium text-slate-400 py-2',{},l)));
  gc.appendChild(wr);
  const dg=h('div','grid grid-cols-7 gap-0.5 p-0.5');
  days.forEach(d=>dg.appendChild(renderDayCell(d)));
  gc.appendChild(dg);gs.appendChild(gc);app.appendChild(gs);

  // Legend
  const ft=h('footer','mt-4 flex items-center justify-center gap-4 text-[10px] text-slate-300');
  ft.appendChild(h('span','inline-flex items-center gap-1',html:'<span class="w-2 h-2 rounded-full bg-red-400"></span> 节假日'));
  ft.appendChild(h('span','inline-flex items-center gap-1',html:'<span class="w-2 h-2 rounded-full bg-orange-400"></span> 调休上班'));
  ft.appendChild(h('span','inline-flex items-center gap-1',html:'<span class="w-2 h-2 rounded-full bg-indigo-400 ring-1 ring-indigo-200"></span> 今天'));
  app.appendChild(ft);
}

// ============ ACTIONS ============
function chgM(dir){state.month+=dir;if(state.month<0){state.month=11;state.year--}if(state.month>11){state.month=0;state.year++}state.cityOpen=false;loadHolidays(state.year,state.month);render();}
function goToday(){const n=new Date();state.year=n.getFullYear();state.month=n.getMonth();state.cityOpen=false;loadHolidays(state.year,state.month);render();}
function selectCity(c){state.lat=c.lat;state.lon=c.lon;state.city=c.name;state.error=null;state.cityOpen=false;state.citySearch='';state.loading=true;render();loadWeather(true);}
async function loadWeather(force){state.loading=true;state.error=null;render();try{if(!force){var c=getCache(state.lat,state.lon);if(c){state.weather=c.daily;state.cur=c.current;state.loading=false;render();return}}var d=await fetchWeather(state.lat,state.lon,7);state.weather=d.daily;state.cur=d.current;setCache(state.lat,state.lon,d);}catch(e){state.error=e.message}state.loading=false;render();}
async function refreshAll(){state.loading=true;render();try{var d=await fetchWeather(state.lat,state.lon,7);state.weather=d.daily;state.cur=d.current;setCache(state.lat,state.lon,d);state.error=null;}catch(e){state.error=e.message}state.loading=false;render();}

// ============ INIT ============
async function initGeo(){
  if(navigator.geolocation){try{const pos=await new Promise((r,rej)=>{navigator.geolocation.getCurrentPosition(r,rej,{enableHighAccuracy:true,timeout:10000,maximumAge:300000});});state.lat=pos.coords.latitude;state.lon=pos.coords.longitude;try{const r2=await fetch(`https://geocoding-api.open-meteo.com/v1/search?latitude=${state.lat}&longitude=${state.lon}&count=1&language=zh&format=json`,{signal:AbortSignal.timeout(5000)});const j=await r2.json();const c=j.results?.[0];state.city=c?.admin2||c?.admin1||state.lat.toFixed(2)+'°, '+state.lon.toFixed(2)+'°';state.error=null;}catch(e2){state.city=state.lat.toFixed(2)+'°, '+state.lon.toFixed(2)+'°';state.error=null}loadWeather();loadHolidays(state.year,state.month);return;}catch(e){if(e.code===1)state.error='定位权限未授权，请手动选城市';else if(e.code===2)state.error='定位超时，请手动选城市';else state.error='定位不可用，请手动选城市'}}else state.error='浏览器不支持定位，请手动选城市';
  state.city='上海';loadWeather();loadHolidays(state.year,state.month);
}

let touchX=0;
document.addEventListener('DOMContentLoaded',()=>{
  document.addEventListener('touchstart',e=>{touchX=e.touches[0].clientX},{passive:true});
  document.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-touchX;if(Math.abs(dx)<50)return;chgM(dx>0?-1:1);});
  initGeo();
});
</script>
</body>
</html>
